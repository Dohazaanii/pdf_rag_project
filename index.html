<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port Tanger Alliance · PDF Assistant</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
   <link rel="stylesheet" href="styles.css">
   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
<div id="app">
  <header>
    <div class="header-text">
      <h1>Port Tanger Alliance · PDF Assistant</h1>
      <p>Powered by LLaMA 3 · RAG on your PFE document</p>
    </div>
    <div class="status-dot" :title="apiReady ? 'API connected' : 'Connecting...'"></div>
  </header>
      <div class="messages" ref="messagesEl">

    <!-- Empty state -->
    <div class="empty-state" v-if="messages.length === 0">
      <div class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0
            01 13.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5
            3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504
            1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0
            00-9-9z"/>
        </svg>
      </div>
      <h2>Ask anything about your document</h2>
              <div class="suggestions">
        <button class="suggestion-btn" v-for="s in suggestions" :key="s" @click="useSuggestion(s)">
          {{ s }}
        </button>
      </div>
    </div>
            <!-- Input bar -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        ref="inputEl"
        v-model="input"
        placeholder="Ask a question about the document…"
        rows="1"
        @input="autoResize"
        @keydown.enter.exact.prevent="send"
        :disabled="loading"
      ></textarea>
      <button class="send-btn" @click="send" :disabled="!input.trim() || loading">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>

</div>
          <script>
              const {createApp, ref, nextTick} = Vue

              createApp({
                  setup(){
                      const  API_UR='http://localhost:8000'

                      const messages   = ref([])
                      const input      = ref('')
                      const apiReady   = ref(true)
                      const messagesEl = ref(null)
                      const inputEl    = ref(null)
                      

                      async function send() {
      const q = input.value.trim()
      if (!q || loading.value) return

      messages.value.push({ id: ++msgId, role: 'user', text: q })
      input.value = ''
      await nextTick()
      if (inputEl.value) inputEl.value.style.height = 'auto'
      await scrollToBottom()

      loading.value = true


                  }
              }).mount('#app')
          </script>
</body>

</html>
